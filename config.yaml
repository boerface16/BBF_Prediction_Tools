    scatter_trends: outputs/figures/scatter_trends
    model_evaluation: outputs/figures/model_evaluation
    keeper_trajectories: outputs/figures/keeper_trajectories

# Column mappings: actual CSV name -> semantic meaning
columns:
  batting:
    player_id: id
    game_id: gid
    pa: b_pa
    ab: b_ab
    runs: b_r
    hits: b_h
    doubles: b_d
    triples: b_t
    hr: b_hr
    rbi: b_rbi
    sh: b_sh
    sf: b_sf
    hbp: b_hbp
    bb: b_w
    ibb: b_iw
    so: b_k
    sb: b_sb
    cs: b_cs
    gdp: b_gdp
    date: date
    gametype: gametype
  pitching:
    player_id: id
    game_id: gid
    ipouts: p_ipouts
    bf: p_bfp
    hits: p_h
    doubles: p_d
    triples: p_t
    hr: p_hr
    runs: p_r
    er: p_er
    bb: p_w
    ibb: p_iw
    so: p_k
    hbp: p_hbp
    gs: p_gs
    gf: p_gf
    wp_id: wp
    lp_id: lp
    sv_id: save
    date: date
    gametype: gametype
  statcast_batters:
    player_id: player_id
    year: year
    barrel_pct: brl_percent
    ev95_pct: ev95percent
    avg_ev: avg_hit_speed
    sweet_spot_pct: anglesweetspotpercent
    est_ba: est_ba
    est_slg: est_slg
    est_woba: est_woba
    sprint_speed: sprint_speed
  statcast_pitchers:
    player_id: player_id
    year: year
    barrel_pct: brl_percent
    ev95_pct: ev95percent
    avg_ev: avg_hit_speed
    sweet_spot_pct: anglesweetspotpercent
    est_ba: est_ba
    est_slg: est_slg
    est_woba: est_woba
    era: era
    xera: xera
    era_xera_diff: era_minus_xera_diff
    swstr_pct: swstr_pct
    csw_pct: csw_pct
    zone_pct: zone_pct
    chase_pct: chase_pct
  statcast_pitch_arsenal:
    pitcher: pitcher
    year: year
    ff_avg_speed: ff_avg_speed
  statcast_arsenal:
    player_id: player_id
    year: year
    pitch_type: pitch_type
    pitch_name: pitch_name
    whiff_pct: whiff_percent
    usage: pitch_usage
    hard_hit_pct: hard_hit_percent
    rv_per_100: run_value_per_100

seasons:
  all: [2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025]
  train: [2017, 2018, 2019, 2020, 2021, 2022, 2023]  # default (pitcher)
  train_batter: [2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022]
  train_pitcher: [2017, 2018, 2019, 2020, 2021, 2022, 2023]
  validation: [2023]  # last CV fold val year (for blend weights)
  test: [2024]
  predict: [2025]
  arsenal_start_year: 2017
  cv_folds:  # default (pitcher)
    - train_end: 2020
      val: [2021]
    - train_end: 2021
      val: [2022]
    - train_end: 2022
      val: [2023]
  cv_folds_batter:
    - train_end: 2018
      val: [2019]
    - train_end: 2020
      val: [2021]
    - train_end: 2021
      val: [2022]

thresholds:
  batter_pa: 200
  pitcher_ip_outs: 150  # 50 IP * 3
  batter_pa_2020: 70
  pitcher_ip_outs_2020: 50  # ~17 IP * 3
  max_null_rate: 0.50

