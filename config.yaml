    statcast_pitchers: data/raw/statcast/statcast_pitchers_2015_2025.csv
    statcast_arsenal: data/raw/statcast/statcast_pitchers_arsenal_2015_2025.csv
    statcast_pitch_arsenal: data/raw/statcast/statcast_pitchers_pitch_arsenal_2015_2025.csv
    keepers: data/keepers_candidates.txt
    fangraphs_batters: data/raw/features/fangraphs_batters_leaderboard_2015_2025.csv
    fangraphs_pitchers: data/raw/features/fangraphs_pitchers_leaderboard_2015_2025.csv
    fg_id_map: data/raw/features/id_map_2015_2025.csv
  processed:
    batters_season: data/processed/batters_season.csv
    pitchers_season: data/processed/pitchers_season.csv
    season_constants: data/processed/season_constants.csv
    re_matrix: data/processed/re_matrix.csv
    batter_re24: data/processed/batter_re24.csv
    pitcher_re24: data/processed/pitcher_re24.csv
    batted_ball: data/processed/batted_ball.csv
    batter_features: data/processed/batter_features.csv
    pitcher_features: data/processed/pitcher_features.csv
  outputs:
    draft_rankings_batters: outputs/draft_rankings_batters.csv
    draft_rankings_pitchers: outputs/draft_rankings_pitchers.csv
    keeper_rankings: outputs/keeper_rankings.csv
    model_performance: outputs/model_performance_report.csv
    re24_exclusions: outputs/re24_exclusions.csv
    batter_model: outputs/batter_model.json
    pitcher_model: outputs/pitcher_model.json
    batter_model_lgb: outputs/batter_model_lgb.json
    pitcher_model_lgb: outputs/pitcher_model_lgb.json
    pitcher_sp_model: outputs/pitcher_sp_model.json
    pitcher_sp_model_lgb: outputs/pitcher_sp_model_lgb.json
    pitcher_rp_model: outputs/pitcher_rp_model.json
