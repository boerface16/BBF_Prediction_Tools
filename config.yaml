keeper:
  trajectory_weight: 0.50
  ml_weight: 0.50
  divergence_threshold: 25
  thresholds:
    auto_keep: 0.80
    keep: 0.60
    borderline: 0.40
    # below borderline = CUT

covid:
  year: 2020
  full_season_games: 162
  actual_games: 60
  sample_weight: 0.5

features:
  # Meta columns always included in feature CSV (not used as model inputs)
  meta: [id, year, last, first, team, primary_pos, G]

  batter:
    # Counting (included in CSV for reference, excluded from model by COUNTING_LEAK_COLS)
    counting: [b_pa, b_hr, b_r, b_rbi, b_sb, b_k, b_w]
    # Model input features (edit this list to add/remove features)
    model:
      - AVG
      - ISO
      - BABIP
      - K_pct
      - BB_pct
      - BB_K_pct
      - SB_pct
      - wOBA
      - wRC_plus
      - RE24
      - GB_pct
      - LD_pct
      - HR_FB_pct
      - brl_percent
      - ev95percent
      - anglesweetspotpercent
      - est_ba
      - est_slg
      - est_woba
      - sprint_speed
      - BABIP_gap
      - xBA_AVG_gap
      - xSLG_SLG_gap
      - team_rpg
      - experience
      - SB_rate
      - career_BABIP
      - K_pct_delta
      - BB_pct_delta
      - ISO_delta
      - BABIP_delta

  pitcher:
    # Counting (included in CSV for reference, excluded from model by COUNTING_LEAK_COLS)
    counting: [p_ipouts, p_bfp, p_k, p_h, p_er, p_w, p_hr, p_hbp, W, L, SV, HD, K_BB, BF, wOBA_against, sweet_spot_pct, ev50, gb_pct, K_pct_savant, SIERA]
    # Model input features (edit this list to add/remove features)
    model:
      - ERA
      - WHIP
      - K9
      - BB9
      - HR9
      - K_BB_pct
      - BABIP_allowed
      - LOB_pct
      - ERA_minus
      - xFIP_minus
      - is_starter
      - is_closer
      - p_gf
      - xera
      - brl_percent_allowed
      - ev95percent_against
      - weighted_whiff_pct
      - avg_hard_hit_pct
      - swstr_pct
      - csw_pct
      - zone_pct
      - chase_pct
      - ff_avg_speed
      - GB_pct
      - BABIP_gap
      - ERA_FIP_gap
      - team_win_pct
      - experience
      - PF
      - K9_delta
      - ERA_delta
      - WHIP_delta
      - BB9_delta
      - ff_velo_delta

model:
  random_state: 42
  optuna_trials: 200
  optuna_seeds: [42, 123, 456, 789, 1010]
  replacement_level_pa: -20  # runs per 600 PA
  runs_per_win: 10
  prediction_bounds:
    batter: [0, 750]
    pitcher: [0, 650]
    pitcher_sp: [0, 650]
    pitcher_rp: [0, 350]
  split_pitcher_roles: true
