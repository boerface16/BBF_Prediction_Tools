# Fantasy Baseball H2H Points Prediction Tool — Configuration
# Team: Twist and Trout

paths:
  raw:
    batting: data/raw/retrosheet/batting.csv
    pitching: data/raw/retrosheet/pitching.csv
    plays: data/raw/retrosheet/plays.csv
    allplayers: data/raw/retrosheet/allplayers.csv
